name: CI

on:
  push:
    branches: [main, fix/production-hardening]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run unit tests
        run: python -m pytest tests/ -q --tb=short

      - name: Lint (optional)
        run: |
          pip install ruff
          ruff check backend/app/ --select E,W,F --ignore E501
        continue-on-error: true

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t almabase-rag:latest .

      - name: Smoke test container
        run: |
          docker run -d --name test-app -p 8000:8000 \
            -e JWT_SECRET=ci-test-secret-$(date +%s) \
            almabase-rag:latest
          sleep 5
          curl -sf http://localhost:8000/api/health | grep -q '"ok"'
          docker stop test-app
